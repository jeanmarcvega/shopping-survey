<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kavore Customer Feedback</title>

<style>

:root{
--bg:#f3f4f6;
--card:#ffffff;
--muted:#666;
--text:#111;
--border:#ddd;
--focus:#111;
--danger:#d32f2f;
--radius:14px;
}

*{box-sizing:border-box;}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Ubuntu,sans-serif;
line-height:1.4;
}

.survey-container{
max-width:720px;
margin:24px auto;
padding:24px;
background:var(--card);
border-radius:var(--radius);
box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.survey-container h2{
margin:0 0 10px 0;
font-size:22px;
font-weight:600;
letter-spacing:0.06em;
text-transform:uppercase;
}

.survey-container p{
margin:0 0 24px 0;
color:var(--muted);
font-size:15px;
}

.question{
margin-bottom:20px;
padding:16px;
border:1px solid rgba(0,0,0,0.06);
border-radius:12px;
background:#fff;
}

.question-label{
display:block;
margin-bottom:12px;
font-weight:650;
font-size:15px;
}

.text-input{
width:100%;
padding:14px;
border:1px solid var(--border);
border-radius:10px;
font-size:16px;
}

.text-input:focus{
outline:none;
border-color:var(--focus);
box-shadow:0 0 0 3px rgba(0,0,0,0.08);
}

.radio-group{
display:flex;
flex-direction:column;
gap:10px;
}

.radio-label{
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-radius:10px;
border:1px solid rgba(0,0,0,0.06);
background:#fafafa;
cursor:pointer;
}

.radio-label:hover{
background:#f5f5f5;
}

.radio-label input{
width:18px;
height:18px;
accent-color:#111;
}

.stars-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.star-btn{
padding:10px 12px;
border:2px solid rgba(0,0,0,0.12);
background:#fff;
border-radius:12px;
cursor:pointer;
font-size:20px;
min-width:72px;
}

.star-btn:hover{
border-color:#111;
}

.star-btn.selected{
border-color:#111;
background:#f3f3f3;
}

.submit-btn{
width:100%;
padding:16px;
background:#111;
color:#fff;
border:none;
border-radius:12px;
font-size:16px;
font-weight:650;
cursor:pointer;
margin-top:14px;
}

.submit-btn:disabled{
opacity:0.6;
cursor:not-allowed;
}

.error-message{
color:var(--danger);
font-size:12px;
margin-top:6px;
display:none;
}

</style>
</head>

<body>

<div class="survey-container">

<h2>Kavore Customer Feedback</h2>
<p>Answer 5 quick questions (takes less than 1 minute).</p>

<form id="surveyForm">

<div class="question">
<label class="question-label">1. What is your name? (Use the same name as your order)</label>
<input type="text" class="text-input" name="name" required>
<div class="error-message" id="nameError">Please enter your name</div>
</div>

<div class="question">
<label class="question-label">2. How easy was it to place your order on Kavore?</label>

<div class="radio-group">

<label class="radio-label">
<input type="radio" name="ease" value="Very easy" required> Very easy
</label>

<label class="radio-label">
<input type="radio" name="ease" value="Easy"> Easy
</label>

<label class="radio-label">
<input type="radio" name="ease" value="Neutral"> Neutral
</label>

<label class="radio-label">
<input type="radio" name="ease" value="Difficult"> Difficult
</label>

</div>

<div class="error-message" id="easeError">Please select an option</div>
</div>

<div class="question">
<label class="question-label">3. What influenced your decision to purchase from Kavore?</label>

<div class="radio-group">

<label class="radio-label">
<input type="radio" name="decision" value="Price" required> Price
</label>

<label class="radio-label">
<input type="radio" name="decision" value="Product quality"> Product quality
</label>

<label class="radio-label">
<input type="radio" name="decision" value="Design"> Design
</label>

<label class="radio-label">
<input type="radio" name="decision" value="Reviews"> Customer reviews
</label>

<label class="radio-label">
<input type="radio" name="decision" value="Social media"> Social media
</label>

<label class="radio-label">
<input type="radio" name="decision" value="Other"> Other
</label>

</div>

<div class="error-message" id="decisionError">Please select an option</div>
</div>

<div class="question">
<label class="question-label">4. Is there anything we could improve?</label>

<div class="radio-group">

<label class="radio-label">
<input type="radio" name="improve" value="Website experience" required> Website experience
</label>

<label class="radio-label">
<input type="radio" name="improve" value="Product information"> Product information
</label>

<label class="radio-label">
<input type="radio" name="improve" value="Checkout process"> Checkout process
</label>

<label class="radio-label">
<input type="radio" name="improve" value="Communication"> Communication or emails
</label>

<label class="radio-label">
<input type="radio" name="improve" value="Nothing — everything was great"> Nothing — everything was great
</label>

</div>

<div class="error-message" id="improveError">Please select an option</div>
</div>

<div class="question">

<label class="question-label">5. How would you rate your overall experience?</label>

<div class="stars-group" id="starsGroup">

<button type="button" class="star-btn" data-stars="5">⭐⭐⭐⭐⭐</button>
<button type="button" class="star-btn" data-stars="4">⭐⭐⭐⭐</button>
<button type="button" class="star-btn" data-stars="3">⭐⭐⭐</button>
<button type="button" class="star-btn" data-stars="2">⭐⭐</button>
<button type="button" class="star-btn" data-stars="1">⭐</button>

</div>

<input type="hidden" name="stars" id="starsInput" required>

<div class="error-message" id="starsError">Please select a rating</div>

</div>

<button type="submit" class="submit-btn">Submit Feedback</button>

</form>
</div>

<script>

const form=document.getElementById("surveyForm")
const starsGroup=document.getElementById("starsGroup")
const starsInput=document.getElementById("starsInput")
const submitBtn=document.querySelector(".submit-btn")

starsGroup.addEventListener("click",function(e){

const btn=e.target.closest(".star-btn")
if(!btn)return

starsGroup.querySelectorAll(".star-btn").forEach(b=>b.classList.remove("selected"))

btn.classList.add("selected")

starsInput.value=btn.dataset.stars

document.getElementById("starsError").style.display="none"

})

form.addEventListener("submit",async function(e){

e.preventDefault()

let valid=true

const name=form.name.value.trim()
const ease=form.querySelector('input[name="ease"]:checked')
const decision=form.querySelector('input[name="decision"]:checked')
const improve=form.querySelector('input[name="improve"]:checked')
const stars=starsInput.value

if(!name){
document.getElementById("nameError").style.display="block"
valid=false
}else{
document.getElementById("nameError").style.display="none"
}

if(!ease){
document.getElementById("easeError").style.display="block"
valid=false
}else{
document.getElementById("easeError").style.display="none"
}

if(!decision){
document.getElementById("decisionError").style.display="block"
valid=false
}else{
document.getElementById("decisionError").style.display="none"
}

if(!improve){
document.getElementById("improveError").style.display="block"
valid=false
}else{
document.getElementById("improveError").style.display="none"
}

if(!stars){
document.getElementById("starsError").style.display="block"
valid=false
}else{
document.getElementById("starsError").style.display="none"
}

if(!valid)return

submitBtn.disabled=true
submitBtn.textContent="Submitting..."

const starRating=parseInt(stars)

if(starRating>=3){
window.open("https://trustpilot.com/evaluate/kavore.com","_blank")
}

const webhook="https://discord.com/api/webhooks/1479064543018881076/8QXjC13yeu7Wyl-F96oUvnLP7WP2fKyGNunN2XkDBqiMwEW5uO_GKMpPnRe0Ghhoprqg"

const payload={
embeds:[{
title:"📋 New Customer Feedback — Kavore",
color:3066993,
fields:[
{name:"Customer Name",value:name},
{name:"Order Ease",value:ease.value,inline:true},
{name:"Rating",value:"⭐".repeat(starRating)+" ("+starRating+" stars)",inline:true},
{name:"Purchase Reason",value:decision.value},
{name:"Improvement Suggestion",value:improve.value}
],
timestamp:new Date().toISOString()
}]
}

try{

const blob=new Blob([JSON.stringify(payload)],{type:"application/json"})

if(navigator.sendBeacon){
navigator.sendBeacon(webhook,blob)
}else{
await fetch(webhook,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
})
}

await new Promise(r=>setTimeout(r,300))

window.location.href="thankyou.html"

}catch(err){

window.location.href="thankyou.html"

}

})

</script>

</body>
</html>
